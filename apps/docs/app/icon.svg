<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="re-reduced">
  <title>re-reduced</title>
  <!-- coral edge segments (gapped, between the nodes) -->
